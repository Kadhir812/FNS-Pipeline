services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - d:/bigdata/kafka_data:/var/lib/kafka/data
    networks:
      - etl-net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - d:/bigdata/es_data:/usr/share/elasticsearch/data
    networks:
      - etl-net
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -s http://localhost:9200/_cluster/health | grep -E '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2.4
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - d:/bigdata/redis_data:/data
    networks:
      - etl-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - d:/ollama:/root/.ollama
    networks:
      - etl-net
    # healthcheck via HTTP — ollama exposes /api/tags when ready
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s   # give ollama time to load models before checks begin

  extract:
    build:
      context: ./E
      dockerfile: Dockerfile
    env_file:
      - ./E/.env
    volumes:
      - ./E/models:/app/models:ro
      - ./E/logs:/app/logs
      - ./E/news_archive.jsonl:/app/news_archive.jsonl
    environment:
      - MODELS_DIR=/app/models
      - APP_DIR=/app
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy   # upgraded from service_started
    restart: unless-stopped
    networks:
      - etl-net

  transform:
    build:
      context: ./T
      dockerfile: Dockerfile
    # ✅ No `command:` override — entrypoint.sh handles jar discovery dynamically
    volumes:
      - ./T/jars:/app/T/jars:ro   # jars mounted as volume, not baked into image
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - etl-net

  l:
    build:
      context: ./L
    env_file:
      - ./L/.env
    volumes:
      # ✅ Mount only what needs to be live-editable, not the entire /app
      - ./L/logs:/app/logs
    ports:
      - "3001:3001"
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - etl-net

  frontend:
    build:
      context: ./frontend
    # ✅ No volume mount — serve the built dist, don't overwrite it
    ports:
      - "5173:80"
    depends_on:
      - l
    networks:
      - etl-net

networks:
  etl-net:
    driver: bridge

# ✅ Removed unused extract_models named volume